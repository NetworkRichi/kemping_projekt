```html
<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KempingZóna - Magyar kemping térkép</title>

    <!-- Hivatalos Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .fo-kontener {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .terkep-oldal {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .lista-oldal {
            width: 380px;
            min-width: 320px;
            background: #1e293b;
            border-left: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .kereso-resz {
            padding: 20px;
            border-bottom: 1px solid #334155;
            background: #0f172a;
        }

        .kereso-mezo {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .kereso-mezo:focus {
            border-color: #10b981;
        }

        .kemping-lista {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .kemping-kartya {
            background: #334155;
            border: 1px solid #475569;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .kemping-kartya:hover {
            border-color: #10b981;
        }

        .kemping-kartya.aktiv {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.15);
        }

        .kemping-nev {
            margin: 8px 0;
            font-size: 16px;
        }

        .kemping-kat {
            color: #34d399;
            font-size: 12px;
            font-weight: bold;
        }

        .kemping-leiras {
            color: #94a3b8;
            font-size: 13px;
            line-height: 1.5;
        }

        .nav-gomb {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration: none;
            background: #10b981;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .custom-marker {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #10b981;
            border: 3px solid white;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(16,185,129,.8);
        }

        .custom-marker.aktiv {
            background: #ef4444;
            width: 18px;
            height: 18px;
            box-shadow: 0 0 15px rgba(239,68,68,.9);
        }

        @media (max-width:768px) {
            .fo-kontener {
                flex-direction: column-reverse;
            }

            .lista-oldal {
                width: 100%;
                height: 50%;
            }

            .terkep-oldal {
                height: 50%;
            }
        }
    </style>
</head>
<body>

<div class="fo-kontener">

    <div class="terkep-oldal">
        <div id="map"></div>
    </div>

    <div class="lista-oldal">

        <div class="kereso-resz">
            <input
                type="text"
                id="searchBar"
                class="kereso-mezo"
                placeholder="Keresés név alapján..."
                oninput="keresesEsSzures()"
            >
        </div>

        <div class="kemping-lista" id="listaKontener"></div>

    </div>

</div>

<script>

mapboxgl.accessToken = 'pk.eyJ1IjoibmV0d29yazI1MTUiLCJhIjoiY21yMmM4dGV4MDNvNDJ6c2MxN3FscWZqcyJ9.un6Zvh11FbEHR7jZlsw0hQ';

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/navigation-night-v1',
    center: [19.5033, 47.1625],
    zoom: 6.8
});

map.addControl(new mapboxgl.NavigationControl());

const mindenHely = [
    {
        id: 1,
        nev: "Balatonfüredi Prémium Kemping",
        kategoria: "⛺ Kemping",
        leiras: "Közvetlen vízparti kemping.",
        lat: 46.9522,
        lng: 17.8921
    },
    {
        id: 2,
        nev: "Dunakanyar Stellplatz",
        kategoria: "🚐 Stellplatz",
        leiras: "Lakóautó parkoló szolgáltatásokkal.",
        lat: 47.7845,
        lng: 18.9652
    },
    {
        id: 3,
        nev: "Mátrai Nomád Vadkemping",
        kategoria: "🌲 Vadkemping",
        leiras: "Erdei tisztás nomád táborozáshoz.",
        lat: 47.8825,
        lng: 19.9345
    },
    {
        id: 4,
        nev: "Szegedi Tisza-parti Kemping",
        kategoria: "⛺ Kemping",
        leiras: "Tisza-parti árnyékos kemping.",
        lat: 46.2530,
        lng: 20.1482
    }
];

let aktualisMarkerek = [];

function feluletFrissites(helyek) {

    const listaKontener = document.getElementById("listaKontener");
    listaKontener.innerHTML = "";

    aktualisMarkerek.forEach(marker => marker.remove());
    aktualisMarkerek = [];

    if (!helyek.length) {
        listaKontener.innerHTML =
            '<p style="text-align:center;color:#94a3b8;">Nincs találat.</p>';
        return;
    }

    helyek.forEach(hely => {

        const kartya = document.createElement("div");
        kartya.className = "kemping-kartya";
        kartya.id = `kartya-${hely.id}`;

        kartya.innerHTML = `
            <div class="kemping-kat">${hely.kategoria}</div>
            <h3 class="kemping-nev">${hely.nev}</h3>
            <div class="kemping-leiras">${hely.leiras}</div>

            <a
                class="nav-gomb"
                href="https://www.google.com/maps?q=${hely.lat},${hely.lng}"
                target="_blank"
            >
                Navigáció
            </a>
        `;

        const markerElem = document.createElement("div");
        markerElem.className = "custom-marker";
        markerElem.id = `marker-${hely.id}`;

        const marker = new mapboxgl.Marker(markerElem)
            .setLngLat([hely.lng, hely.lat])
            .addTo(map);

        aktualisMarkerek.push(marker);

        kartya.addEventListener("click", () => {
            aktivalas(hely.id, hely.lng, hely.lat);
        });

        markerElem.addEventListener("click", (e) => {
            e.stopPropagation();
            aktivalas(hely.id, hely.lng, hely.lat);
        });

        listaKontener.appendChild(kartya);
    });
}

function aktivalas(id, lng, lat) {

    document.querySelectorAll(".kemping-kartya")
        .forEach(el => el.classList.remove("aktiv"));

    document.querySelectorAll(".custom-marker")
        .forEach(el => el.classList.remove("aktiv"));

    const kartya = document.getElementById(`kartya-${id}`);
    const marker = document.getElementById(`marker-${id}`);

    if (kartya) {
        kartya.classList.add("aktiv");
        kartya.scrollIntoView({
            behavior: "smooth",
            block: "nearest"
        });
    }

    if (marker) {
        marker.classList.add("aktiv");
    }

    map.flyTo({
        center: [lng, lat],
        zoom: 12,
        speed: 1.2
    });
}

function keresesEsSzures() {

    const szo = document
        .getElementById("searchBar")
        .value
        .toLowerCase();

    const talalatok = mindenHely.filter(hely =>
        hely.nev.toLowerCase().includes(szo)
    );

    feluletFrissites(talalatok);
}

map.on("load", () => {
    feluletFrissites(mindenHely);
});

</script>

</body>
</html>
