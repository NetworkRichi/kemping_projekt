<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KempingZóna - Magyar kemping és Stellplatz térkép</title>
    
    <!-- Leaflet térkép stílusok beágyazva, hogy ne tiltsa le a Vercel -->
    <style>
        .leaflet-pane, .leaflet-tile, .leaflet-marker-icon, .leaflet-marker-shadow, .leaflet-tile-container, .leaflet-pane > svg, .leaflet-pane > canvas, .leaflet-zoom-box, .leaflet-image-layer, .leaflet-layer { position: absolute; left: 0; top: 0; }
        .leaflet-container { overflow: hidden; -ms-touch-action: none; touch-action: none; }
        .leaflet-tile, .leaflet-marker-icon, .leaflet-marker-shadow { -webkit-user-select: none; -moz-user-select: none; user-select: none; -webkit-user-drag: none; }
        .leaflet-tile { filter: inherit; visibility: hidden; }
        .leaflet-tile-loaded { visibility: inherit; }
        .leaflet-zoom-box { width: 0; height: 0; -moz-box-sizing: border-box; box-sizing: border-box; z-index: 800; }
        .leaflet-pane { z-index: 400; }
        .leaflet-tile-pane    { z-index: 200; }
        .leaflet-overlay-pane { z-index: 400; }
        .leaflet-shadow-pane  { z-index: 500; }
        .leaflet-marker-pane  { z-index: 600; }
        .leaflet-tooltip-pane { z-index: 650; }
        .leaflet-popup-pane   { z-index: 700; }
        .leaflet-map-pane canvas { z-index: 100; }
        .leaflet-map-pane svg    { z-index: 200; }
        .leaflet-vml-shape { width: 1px; height: 1px; }
        .lvml { behavior: url(#default#VML); display: inline-block; position: absolute; }
        .leaflet-control { position: relative; z-index: 800; pointer-events: auto; float: left; clear: both; }
        .leaflet-top, .leaflet-bottom { position: absolute; z-index: 1000; pointer-events: none; }
        .leaflet-top { top: 0; }
        .leaflet-right { right: 0; }
        .leaflet-bottom { bottom: 0; }
        .leaflet-left { left: 0; }
        .leaflet-control { margin-left: 10px; margin-top: 10px; }
        .leaflet-top .leaflet-control { margin-top: 90px; }
        .leaflet-bottom .leaflet-control { margin-bottom: 10px; }
        .leaflet-left .leaflet-control { margin-left: 10px; }
        .leaflet-right .leaflet-control { margin-right: 10px; }
        
        /* ALAPOK: Teljes képernyős elrendezés tiszta CSS-szel */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #111827;
            color: #ffffff;
        }

        /* A TÉRKÉP HÁTTÉRRÉTEGE */
        #map { 
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100% !important;
            height: 100% !important;
            z-index: 1; 
            background: #111827;
        }

        /* FELSŐ KERESŐSÁV */
        .kereso-kontener {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 420px;
            z-index: 10;
            background: rgba(31, 41, 55, 0.95);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .kereso-sor { display: flex; gap: 8px; }

        .kereso-mezo {
            flex-grow: 1;
            background-color: #374151;
            border: 1px solid #4b5563;
            color: white;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            width: 100%;
        }

        .kereso-mezo:focus { border-color: #10b981; }

        /* KATEGÓRIA GOMBOK */
        .gomb-sor { display: flex; gap: 8px; overflow-x: auto; margin-top: 12px; padding-bottom: 4px; }
        .gomb-sor::-webkit-scrollbar { display: none; }

        .szuro-gomb {
            background-color: #374151;
            color: #d1d5db;
            border: none;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .szuro-gomb.aktiv { background-color: #059669; color: white; font-weight: bold; }

        /* ALSÓ INFORMÁCIÓS PANEL */
        .info-panel {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 480px;
            background-color: #1f2937;
            border-top: 1px solid #374151;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 24px;
            box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease-out;
            z-index: 20;
            box-sizing: border-box;
        }

        .info-panel.nyitva { transform: translate(-50%, 0); }
        .panel-csik { width: 48px; height: 6px; background-color: #4b5563; border-radius: 3px; margin: 0 auto 16px auto; cursor: pointer; }
        .panel-fejlec { display: flex; justify-content: space-between; align-items: flex-start; }
        .kategoria-cimke { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #34d399; background-color: rgba(6, 78, 59, 0.5); padding: 4px 8px; border-radius: 6px; }
        .hely-neve { margin: 8px 0 0 0; font-size: 22px; font-weight: bold; }
        .bezar-gomb { background: none; border: none; color: #9ca3af; font-size: 22px; cursor: pointer; }

        .leiras-szoveg { font-size: 14px; color: #9ca3af; margin-top: 14px; line-height: 1.6; }
        .ikon-sor { display: flex; gap: 16px; font-size: 14px; border-top: 1px solid #374151; border-bottom: 1px solid #374151; padding: 14px 0; margin: 20px 0; color: #d1d5db; }
        .nav-gomb { width: 100%; background-color: #10b981; color: white; border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- 1. FELSŐ KERESŐ ÉS KATEGÓRIA SÁV -->
    <div class="kereso-kontener">
        <div class="kereso-sor">
            <input type="text" id="searchBar" oninput="keresesEsSzures()" placeholder="Keresés név alapján (pl. Balaton...)" class="kereso-mezo">
        </div>
        <div class="gomb-sor">
            <button id="btn-all" onclick="kategoriaValasztas('all')" class="szuro-gomb aktiv">Mind</button>
            <button id="btn-camping" onclick="kategoriaValasztas('camping')" class="szuro-gomb">⛺ Kemping</button>
            <button id="btn-stellplatz" onclick="kategoriaValasztas('stellplatz')" class="szuro-gomb">🚐 Stellplatz</button>
            <button id="btn-nature" onclick="kategoriaValasztas('nature')" class="szuro-gomb">🌲 Vadkemping</button>
        </div>
    </div>

    <!-- 2. A TÉRKÉP HELYE -->
    <div id="map"></div>

    <!-- 3. ALSÓ INFORMÁCIÓS PANEL -->
    <div id="detailPanel" class="info-panel">
        <div class="panel-csik" onclick="closePanel()"></div>
        <div class="panel-fejlec">
            <div>
                <span id="panelCategory" class="kategoria-cimke">Kategória</span>
                <h2 id="panelTitle" class="hely-neve">Kemping Neve</h2>
            </div>
            <button onclick="closePanel()" class="bezar-gomb">✕</button>
        </div>
        <p id="panelDescription" class="leiras-szoveg">Leírás...</p>
        
        <div class="ikon-sor">
            <span>💧 Ivóvíz</span>
            <span>🔌 Áram</span>
            <span>🐾 Kutyabarát</span>
        </div>

        <button id="navButton" class="nav-gomb">Útvonaltervezés (Google Maps)</button>
    </div>

    <!-- JavaScript Könyvtárak betöltése -->
    <script src="https://unpkg.com"></script>

    <script>
        // --- TÉRKÉP ALAPBEÁLLÍTÁSOK ---
        const map = L.map('map', { zoomControl: false }).setView([47.1625, 19.5033], 7);
        let markerCsoport = L.layerGroup().addTo(map);

        // Standard OpenStreetMap réteg betöltése HTTPS protokollal
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let aktivaltKategoria = 'all'; 
        let mindenHely = []; 

        // --- TESZT ADATOK GENERÁLÁSA ---
        function adatokBetoltese() {
            mindenHely = [
                { id: 1, nev: "Balatonfüredi Prémium Kemping", kategoria: "camping", leiras: "Közvetlen vízparti kemping parcellákkal, modern vizesblokkal és saját stranddal a Balatonnál.", lat: 46.9522, lng: 17.8921 },
                { id: 2, nev: "Dunakanyar Stellplatz", kategoria: "stellplatz", leiras: "Automata kapus, elkerített lakóautó parkoló áramcsatlakozással és szürkevíz ürítéssel.", lat: 47.7845, lng: 18.9652 },
                { id: 3, nev: "Mátrai Nomád Vadkemping hely", kategoria: "nature", leiras: "Gyönyörű erdei tisztás a magasan fekvő részeken, teljesen nomád körülmények között, térerő nélkül.", lat: 47.8825, lng: 19.9345 },
                { id: 4, nev: "Szegedi Tisza-parti Kemping", kategoria: "camping", leiras: "Fás, árnyékos kemping a Tisza folyó közvetlen közelében, pár percre a belvárostól.", lat: 46.2530, lng: 20.1482 }
            ];
            terkepFrissites(mindenHely);
        }

        // --- SEARCH & FILTER LOGIKA ---
        function keresesEsSzures() {
            const keresettSzo = document.getElementById('searchBar').value.toLowerCase();
            
            const szurtHelyek = mindenHely.filter(hely => {
const egyezikKategoria = (aktivaltKategoria === 'all' || hely.kategoria === aktivaltKategoria);const egyezikNev = hely.nev.toLowerCase().includes(keresettSzo);return egyezikKategoria && egyezikNev;});terkepFrissites(szurtHelyek);}function kategoriaValasztas(kat) {aktivaltKategoria = kat;['all', 'camping', 'stellplatz', 'nature'].forEach(k => {const btn = document.getElementById(btn-${k});if (k === kat) btn.classList.add('aktiv');else btn.classList.remove('aktiv');});keresesEsSzures();}function terkepFrissites(helyek) {markerCsoport.clearLayers();helyek.forEach(hely => {const marker = L.marker([hely.lat, hely.lng]).addTo(markerCsoport);marker.on('click', () => openPanel(hely));});}// --- PANEL INTERAKCIÓK ---function openPanel(hely) {document.getElementById('panelTitle').innerText = hely.nev;document.getElementById('panelDescription').innerText = hely.leiras;document.getElementById('panelCategory').innerText = hely.kategoria === 'camping' ? '⛺ Kemping' : hely.kategoria === 'stellplatz' ? '🚐 Stellplatz' : '🌲 Vadkemping';document.getElementById('navButton').onclick = () => {window.open(https://google.com{hely.lat},${hely.lng}, '_blank');};document.getElementById('detailPanel').classList.add('nyitva');}function closePanel() {document.getElementById('detailPanel').classList.remove('nyitva');}adatokBetoltese();
