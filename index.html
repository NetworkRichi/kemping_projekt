<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KempingZóna - Magyar kemping térkép</title>
    <style>
        /* ALAPOK */
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #111827; color: #ffffff;
        }

        .fo-kontener {
            display: flex; width: 100%; height: 100%;
        }

        /* BAL OLDAL: A TÉRKÉP (Google Maps) */
        .terkep-oldal {
            flex-grow: 1; height: 100%; background: #1f2937; position: relative;
        }

        iframe {
            width: 100%; height: 100%; border: none;
        }

        /* JOBB OLDAL: A KERESŐ ÉS LISTA */
        .lista-oldal {
            width: 380px; min-width: 320px; height: 100%;
            background-color: #1f2937; border-left: 1px solid #374151;
            display: flex; flex-direction: column; box-sizing: border-box;
            z-index: 10;
        }

        .kereso-resz {
            padding: 20px; border-bottom: 1px solid #374151;
        }

        .kereso-mezo {
            width: 100%; background-color: #374151; border: 1px solid #4b5563;
            color: white; border-radius: 8px; padding: 12px; font-size: 14px;
            outline: none; box-sizing: border-box;
        }

        .kereso-mezo:focus { border-color: #10b981; }

        /* KEMPINGSZŰRŐ KÁRTYÁK */
        .kemping-lista {
            flex-grow: 1; overflow-y: auto; padding: 10px 20px;
        }

        .kemping-kartya {
            background-color: #374151; border: 1px solid #4b5563;
            border-radius: 10px; padding: 16px; margin-bottom: 12px;
            cursor: pointer; transition: all 0.2s;
        }

        .kemping-kartya:hover {
            border-color: #10b981; background-color: #4b5563;
        }

        .kemping-kartya.aktiv {
            border-color: #10b981; background-color: rgba(16, 185, 129, 0.1);
        }

        .kemping-nev { margin: 0 0 6px 0; font-size: 16px; font-weight: bold; }
        .kemping-kat { font-size: 11px; color: #10b981; text-transform: uppercase; font-weight: bold; }
        .kemping-leiras { font-size: 13px; color: #9ca3af; margin-top: 6px; line-clamp: 2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .nav-gomb {
            display: inline-block; background-color: #10b981; color: white;
            padding: 6px 12px; border-radius: 6px; text-decoration: none;
            font-size: 12px; font-weight: bold; margin-top: 10px;
        }

        /* MOBILBARÁT NÉZET */
        @media (max-width: 768px) {
            .fo-kontener { flex-direction: column-reverse; }
            .lista-oldal { width: 100%; height: 45%; }
            .terkep-oldal { height: 55%; }
        }
    </style>
</head>
<body>

    <div class="fo-kontener">
        
        <!-- 1. TÉRKÉP OLDAL -->
        <div class="terkep-oldal">
            <!-- Az alapértelmezett térkép Magyarországra mutat -->
            <iframe id="googleMap" src="https://google.com"></iframe>
        </div>

        <!-- 2. KERESŐ ÉS LISTA OLDAL -->
        <div class="lista-oldal">
            <div class="kereso-resz">
                <input type="text" id="searchBar" oninput="keresesEsSzures()" placeholder="Keresés név alapján..." class="kereso-mezo">
            </div>
            
            <div class="kemping-lista" id="listaKontener">
                <!-- Ide pakolja be a JavaScript a helyeket -->
            </div>
        </div>

    </div>

    <script>
        // ADATBÁZIS ALAPOK
        const mindenHely = [
            { id: 1, nev: "Balatonfüredi Prémium Kemping", kategoria: "⛺ Kemping", leiras: "Közvetlen vízparti kemping parcellákkal, modern vizesblokkal és saját stranddal.", lat: 46.9522, lng: 17.8921, q: "Balatonfuredi+Premium+Camping" },
            { id: 2, nev: "Dunakanyar Stellplatz", kategoria: "🚐 Stellplatz", leiras: "Automata kapus, elkerített lakóautó parkoló áramcsatlakozással és szürkevíz ürítéssel.", lat: 47.7845, lng: 18.9652, q: "Szob+Stellplatz" },
            { id: 3, nev: "Mátrai Nomád Vadkemping", kategoria: "🌲 Vadkemping", leiras: "Gyönyörű erdei tisztás a magasan fekvő részeken, teljesen nomád körülmények között.", lat: 47.8825, lng: 19.9345, q: "Galyateto" },
            { id: 4, nev: "Szegedi Tisza-parti Kemping", kategoria: "⛺ Kemping", leiras: "Fás, árnyékos kemping a Tisza folyó közvetlen közelében, pár percre a belvárostól.", lat: 46.2530, lng: 20.1482, q: "Szegedi+Tiszaparti+Camping" }
        ];

        // Oldal indulásakor kirajzoljuk a listát
        function listaKirajzolas(helyek) {
            const kontener = document.getElementById('listaKontener');
            kontener.innerHTML = ''; // Kiürítés

            if(helyek.length === 0) {
                kontener.innerHTML = '<p style="color:#9ca3af; text-align:center; margin-top:20px;">Nincs találat...</p>';
                return;
            }

            helyek.forEach(hely => {
                const kartya = document.createElement('div');
                kartya.className = 'kemping-kartya';
                kartya.onclick = () => terkepUgras(hely.q, kartya);
                
                kartya.innerHTML = `
                    <span class="kemping-kat">${hely.kategoria}</span>
                    <h3 class="kemping-nev">${hely.nev}</h3>
                    <p class="kemping-leiras">${hely.leiras}</p>
                    <a class="nav-gomb" href="https://google.com{hely.lat},${hely.lng}" target="_blank">Google Navigáció</a>
                `;
                kontener.appendChild(kartya);
            });
        }

        // TÉRKÉP IRÁNYÍTÁSA
        function terkepUgras(keresoszo, elem) {
            // Eltávolítjuk a többi kártyáról az aktív színt, és rárakjuk erre
            const kartyak = document.querySelectorAll('.kemping-kartya');
            kartyak.forEach(k => k.classList.remove('aktiv'));
            elem.classList.add('aktiv');

            // Átírjuk az iframe linkjét, a Google Maps azonnal oda ugrik és rázoomol!
            const ujTerkepLink = `https://google.com{keresoszo}&t=&z=14&ie=UTF-8&iwloc=&output=embed`;
            document.getElementById('googleMap').src = ujTerkepLink;
        }

        // KERESŐ MOTOR
        function keresesEsSzures() {
            const szo = document.getElementById('searchBar').value.toLowerCase();
            const szurt = mindenHely.filter(hely => hely.nev.toLowerCase().includes(szo));
            listaKirajzolas(szurt);
        }

        // Start
        listaKirajzolas(mindenHely);
    </script>
</body>
</html>
